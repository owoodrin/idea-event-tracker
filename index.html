<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>IDEA — Event Registration Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Libre+Franklin:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#1d6e87;
    --navy:#102a43;
    --paper:#fefdfb;
    --ink:#1a1714;
    --subtle:#f7f6f3;
    --rule:#dad6cf;
    --tealtint:#8fc1d4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Libre Franklin',system-ui,sans-serif;
    line-height:1.5;
  }
  a{color:var(--teal)}

  /* ---------- header ---------- */
  header{
    background:var(--navy);
    color:#fff;
    padding:22px 0 20px;
  }
  .wrap{max-width:960px;margin:0 auto;padding:0 24px}
  .head-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .lockup{display:flex;align-items:center;gap:0}
  .lockup svg{display:block;height:44px;width:auto}
  .head-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
  .tag{
    font-family:'Space Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--tealtint);
  }
  .head-title{
    font-family:'Libre Franklin',sans-serif;
    font-weight:600;font-size:14px;color:#fff;
  }

  /* ---------- event selector ---------- */
  .selector-band{border-bottom:1px solid var(--rule);background:var(--subtle)}
  .selector{display:flex;gap:0;overflow-x:auto}
  .selector button{
    appearance:none;border:none;background:none;cursor:pointer;
    font-family:'Libre Franklin',sans-serif;font-weight:600;font-size:14px;
    color:var(--ink);padding:14px 18px;border-bottom:3px solid transparent;
    white-space:nowrap;
  }
  .selector button[aria-selected="true"]{color:var(--teal);border-bottom-color:var(--teal)}
  .selector button:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}

  /* ---------- event header ---------- */
  .event-head{padding:36px 0 6px}
  .event-eyebrow{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--teal);margin-bottom:8px;
  }
  h1.event-name{
    font-family:'Archivo Black',sans-serif;
    font-size:clamp(26px,4.5vw,40px);
    line-height:1.1;letter-spacing:.005em;
  }
  .event-note{margin-top:8px;font-size:14px;color:#5a554e}

  /* ---------- stats ---------- */
  .stats{
    display:grid;gap:20px;
    grid-template-columns:minmax(200px,1.3fr) repeat(3,1fr);
    padding:28px 0 8px;align-items:end;
  }
  @media (max-width:720px){.stats{grid-template-columns:1fr 1fr}}
  .stat-big{position:relative;display:inline-block}
  .stat-big .shadow{
    position:absolute;inset:0;transform:translate(6px,6px);
    background:var(--tealtint);z-index:0;
  }
  .stat-big .face{
    position:relative;z-index:1;background:var(--navy);color:#fff;
    padding:14px 22px 10px;
  }
  .stat-big .num{
    font-family:'Archivo Black',sans-serif;
    font-size:clamp(44px,7vw,68px);line-height:1;
  }
  .stat-big .lbl{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--tealtint);margin-top:6px;
  }
  .stat{border-top:3px solid var(--teal);padding-top:10px}
  .stat .num{
    font-family:'Archivo Black',sans-serif;font-size:24px;line-height:1.15;
  }
  .stat .sub{font-size:13px;color:#5a554e}
  .stat .lbl{
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--teal);margin-top:4px;
  }

  /* ---------- chart card ---------- */
  .chart-card{
    border:1px solid var(--rule);background:#fff;
    margin:30px 0 12px;padding:20px 20px 12px;
  }
  .chart-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .chart-title{font-family:'Libre Franklin',sans-serif;font-weight:700;font-size:16px}
  .view-toggle{display:flex;border:1px solid var(--rule)}
  .view-toggle button{
    appearance:none;border:none;background:#fff;cursor:pointer;
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;padding:7px 12px;color:var(--ink);
  }
  .view-toggle button+button{border-left:1px solid var(--rule)}
  .view-toggle button[aria-pressed="true"]{background:var(--teal);color:#fff}
  .view-toggle button:focus-visible{outline:2px solid var(--navy);outline-offset:-2px}
  #chart{width:100%;display:block}
  .chart-foot{
    font-family:'Space Mono',monospace;font-size:10px;color:#7a746b;
    letter-spacing:.04em;margin-top:8px;
  }

  footer{
    margin-top:40px;border-top:1px solid var(--rule);
    padding:18px 0 34px;
    font-family:'Space Mono',monospace;font-size:11px;color:#7a746b;
    display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;
  }
  @media (prefers-reduced-motion:no-preference){
    .stat-big .face{transition:transform .15s ease}
  }
</style>
</head>
<body>

<header>
  <div class="wrap head-row">
    <div class="lockup" aria-label="IDEA — International Development Economics Association">
      <!-- Primary integrated wordmark, reversed white on dark blue (brand spec §1/§7) -->
      <svg viewBox="0 0 540 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
        <g stroke="#fefdfb" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M120,28 A92,92 0 0 0 120,212"/>
          <path d="M120,28 A92,92 0 0 1 120,212"/>
          <path d="M120,28 L120,212"/>
          <path d="M120,28 Q60,120 120,212"/>
          <path d="M37,80 Q96,66 120,74"/>
          <path d="M28,120 L120,120"/>
          <path d="M37,160 Q96,174 120,166"/>
        </g>
        <text x="150" y="120" font-family="'Archivo Black', sans-serif" font-size="104"
              dominant-baseline="middle" fill="#fefdfb">IDEA</text>
      </svg>
    </div>
    <div class="head-meta">
      <span class="tag">Internal · Board</span>
      <span class="head-title">Event Registration Tracker</span>
    </div>
  </div>
</header>

<nav class="selector-band" aria-label="Events">
  <div class="wrap">
    <div class="selector" role="tablist" id="event-tabs"></div>
  </div>
</nav>

<main class="wrap">
  <div class="event-head">
    <div class="event-eyebrow" id="ev-eyebrow"></div>
    <h1 class="event-name" id="ev-name"></h1>
    <p class="event-note" id="ev-note"></p>
  </div>

  <section class="stats" aria-label="Summary statistics">
    <div class="stat-big">
      <div class="shadow" aria-hidden="true"></div>
      <div class="face">
        <div class="num" id="s-total">–</div>
        <div class="lbl">Total registrations</div>
      </div>
    </div>
    <div class="stat">
      <div class="num" id="s-24h">–</div>
      <div class="lbl">Past 24 hours</div>
    </div>
    <div class="stat">
      <div class="num" id="s-peak">–</div>
      <div class="sub" id="s-peak-when"></div>
      <div class="lbl" id="s-peak-lbl">Peak hour</div>
    </div>
    <div class="stat">
      <div class="num" id="s-latest">–</div>
      <div class="sub" id="s-latest-date"></div>
      <div class="lbl">Latest registration</div>
    </div>
  </section>

  <section class="chart-card" aria-label="Registrations over time">
    <div class="chart-top">
      <div class="chart-title" id="chart-title">Registrations over time</div>
      <div class="view-toggle" role="group" aria-label="Chart view">
        <button id="btn-cum" aria-pressed="true">Cumulative</button>
        <button id="btn-day" aria-pressed="false">Per day</button>
        <button id="btn-hour" aria-pressed="false">Per hour</button>
      </div>
    </div>
    <svg id="chart" role="img" aria-label="Registration chart"></svg>
    <div class="chart-foot" id="chart-foot"></div>
  </section>

  <footer>
    <span>International Development Economics Association</span>
    <span id="foot-updated"></span>
  </footer>
</main>

<script src="data.js"></script>
<script>
(function(){
  "use strict";
  const C = { teal:'#1d6e87', navy:'#102a43', tint:'#8fc1d4', rule:'#dad6cf', ink:'#1a1714', grey:'#7a746b' };
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const events = (window.IDEA_EVENTS || []).map(e => ({
    ...e,
    times: e.timestamps.map(t => new Date(t)).sort((a,b)=>a-b)
  })).filter(e => e.times.length);

  let current = 0;
  let view = 'cum'; // 'cum' | 'day' | 'hour'

  // ---- tabs ----
  const tabs = document.getElementById('event-tabs');
  events.forEach((e,i)=>{
    const b = document.createElement('button');
    b.textContent = e.name;
    b.setAttribute('role','tab');
    b.setAttribute('aria-selected', i===0 ? 'true':'false');
    b.addEventListener('click', ()=>{ current=i; renderAll(); });
    tabs.appendChild(b);
  });

  function fmtDate(d){ return MONTHS[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }
  function fmtDT(d){
    return MONTHS[d.getMonth()]+' '+d.getDate()+', '+
      String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  function fmtHM(d){ return String(d.getHours()).padStart(2,'0')+':00'; }

  function binData(times, unit){
    const hourly = unit === 'hour';
    const key = d => hourly
      ? new Date(d.getFullYear(),d.getMonth(),d.getDate(),d.getHours()).getTime()
      : new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime();
    const step = hourly ? 3600000 : 86400000;
    const start = key(times[0]);
    const end = key(times[times.length-1]);
    const bins = [];
    for(let t=start; t<=end; t+=step) bins.push({t, n:0});
    const idx = t => Math.round((key(t)-start)/step);
    times.forEach(t => { bins[idx(t)].n++; });
    return { bins, step, hourly };
  }

  function renderStats(e){
    const T = e.times, n = T.length, last = T[n-1];
    document.getElementById('s-total').textContent = n.toLocaleString();
    const cutoff = new Date(last.getTime() - 86400000);
    document.getElementById('s-24h').textContent =
      T.filter(t => t > cutoff).length.toLocaleString();
    const {bins} = binData(T, 'day');
    const peak = bins.reduce((a,b)=> b.n>a.n ? b : a, bins[0]);
    const pd = new Date(peak.t);
    document.getElementById('s-peak').textContent = peak.n.toLocaleString();
    document.getElementById('s-peak-when').textContent = fmtDate(pd);
    document.getElementById('s-peak-lbl').textContent = 'Peak day';
    document.getElementById('s-latest').textContent =
      String(last.getHours()).padStart(2,'0')+':'+String(last.getMinutes()).padStart(2,'0');
    document.getElementById('s-latest-date').textContent = fmtDate(last);
    document.getElementById('foot-updated').textContent =
      'DATA THROUGH '+fmtDT(last).toUpperCase();
  }

  function renderHead(e){
    document.getElementById('ev-eyebrow').textContent =
      e.eventDate ? 'Event date · '+fmtDate(new Date(e.eventDate+'T00:00')) : 'Event';
    document.getElementById('ev-name').textContent = e.name;
    document.getElementById('ev-note').textContent = e.note || '';
    [...tabs.children].forEach((b,i)=> b.setAttribute('aria-selected', i===current?'true':'false'));
  }

  // ---- chart ----
  function renderChart(e){
    const svg = document.getElementById('chart');
    const unit = view==='day' ? 'day' : 'hour'; // cumulative drawn at hourly resolution
    const {bins, step, hourly} = binData(e.times, unit);
    const W = Math.max(svg.parentElement.clientWidth - 40, 320);
    const H = Math.min(Math.max(Math.round(W*0.42), 220), 340);
    const M = {t:18, r:14, b:34, l:44};
    svg.setAttribute('viewBox', '0 0 '+W+' '+H);
    svg.setAttribute('width', W); svg.setAttribute('height', H);
    svg.innerHTML = '';
    const iw = W-M.l-M.r, ih = H-M.t-M.b;
    const x0 = bins[0].t, x1 = bins[bins.length-1].t + step;
    const X = t => M.l + (t-x0)/(x1-x0)*iw;

    let series, yMax;
    if(view==='cum'){
      let run=0;
      series = bins.map(b => ({t:b.t, v:(run+=b.n)}));
      yMax = series[series.length-1].v;
    } else {
      series = bins.map(b => ({t:b.t, v:b.n}));
      yMax = Math.max(...series.map(s=>s.v));
    }
    const niceMax = niceCeil(yMax);
    const Y = v => M.t + ih - (v/niceMax)*ih;
    const NS = 'http://www.w3.org/2000/svg';
    const el = (tag, attrs) => {
      const n = document.createElementNS(NS, tag);
      for(const k in attrs) n.setAttribute(k, attrs[k]);
      svg.appendChild(n); return n;
    };
    const txt = (x,y,s,attrs) => {
      const n = el('text', Object.assign({x,y,'font-family':"'Space Mono',monospace",'font-size':'10','fill':C.grey}, attrs||{}));
      n.textContent = s; return n;
    };

    // y grid
    const yTicks = 4;
    for(let i=0;i<=yTicks;i++){
      const v = niceMax*i/yTicks, y = Y(v);
      el('line',{x1:M.l,y1:y,x2:W-M.r,y2:y,stroke:C.rule,'stroke-width':i===0?1.5:1,'stroke-dasharray':i===0?'':'2 3'});
      txt(M.l-6, y+3, String(Math.round(v)), {'text-anchor':'end'});
    }

    // x ticks
    if(hourly){
      const tickEvery = Math.max(1, Math.round(bins.length/8));
      bins.forEach((b,i)=>{
        const d = new Date(b.t);
        if(d.getHours()===0 && i>0){
          el('line',{x1:X(b.t),y1:M.t,x2:X(b.t),y2:M.t+ih,stroke:C.rule,'stroke-width':1});
        }
        if(i % tickEvery === 0){
          txt(X(b.t + step/2), H-20, fmtHM(d), {'text-anchor':'middle'});
        }
      });
      // teal day band labels under the hour ticks
      const days = {};
      bins.forEach(b=>{ const d=new Date(b.t); const k=d.toDateString(); (days[k]=days[k]||[]).push(b.t); });
      Object.keys(days).forEach(k=>{
        const ts = days[k], d = new Date(ts[0]);
        txt((X(ts[0])+X(ts[ts.length-1]+step))/2, H-6, (MONTHS[d.getMonth()]+' '+d.getDate()).toUpperCase(), {'text-anchor':'middle','fill':C.teal,'font-weight':'700','letter-spacing':'.1em'});
      });
    } else {
      const tickEvery = Math.max(1, Math.ceil(bins.length/10));
      bins.forEach((b,i)=>{
        const d = new Date(b.t);
        if(i % tickEvery === 0){
          txt(X(b.t + step/2), H-12, MONTHS[d.getMonth()]+' '+d.getDate(), {'text-anchor':'middle'});
        }
      });
    }

    if(view!=='cum'){
      const bw = Math.max(iw/bins.length - 2, 2);
      series.forEach(s=>{
        if(s.v===0) return;
        el('rect',{x:X(s.t)+1, y:Y(s.v), width:bw, height:M.t+ih-Y(s.v), fill:C.tint});
        el('rect',{x:X(s.t)+1, y:Y(s.v), width:bw, height:2, fill:C.teal});
      });
      // peak annotation
      const peak = series.reduce((a,b)=> b.v>a.v?b:a, series[0]);
      txt(Math.min(X(peak.t)+6, W-M.r-40), Y(peak.v)-6, String(peak.v), {'fill':C.navy,'font-weight':'700'});
    } else {
      let dArea = 'M '+M.l+' '+(M.t+ih);
      let dLine = '';
      series.forEach((s,i)=>{
        const px1 = X(s.t), px2 = X(s.t+step), py = Y(s.v);
        dArea += ' L '+px1+' '+py+' L '+px2+' '+py;
        dLine += (i===0?'M '+px1:' L '+px1)+' '+py+' L '+px2+' '+py;
      });
      dArea += ' L '+(W-M.r)+' '+(M.t+ih)+' Z';
      el('path',{d:dArea, fill:C.tint, 'fill-opacity':'0.35'});
      el('path',{d:dLine, fill:'none', stroke:C.teal, 'stroke-width':2.5});
      const last = series[series.length-1];
      el('circle',{cx:X(last.t+step), cy:Y(last.v), r:4, fill:C.navy});
      txt(X(last.t+step)-8, Y(last.v)-10, String(last.v), {'text-anchor':'end','fill':C.navy,'font-weight':'700','font-size':'12'});
    }

    document.getElementById('chart-title').textContent =
      view==='cum' ? 'Cumulative registrations' :
      view==='day' ? 'Registrations per day' : 'Registrations per hour';
    document.getElementById('chart-foot').textContent =
      'TIMES AS RECORDED IN THE REGISTRATION SHEET · '+e.times.length+' REGISTRATIONS · '+
      fmtDT(e.times[0]).toUpperCase()+' — '+fmtDT(e.times[e.times.length-1]).toUpperCase();
  }

  function niceCeil(v){
    if(v<=10) return 10;
    const p = Math.pow(10, Math.floor(Math.log10(v)));
    for(const m of [1,2,2.5,5,10]) if(m*p >= v) return m*p;
    return 10*p;
  }

  function renderAll(){
    const e = events[current];
    renderHead(e); renderStats(e); renderChart(e);
  }

  const VIEW_BTNS = { cum:'btn-cum', day:'btn-day', hour:'btn-hour' };
  Object.keys(VIEW_BTNS).forEach(v=>{
    document.getElementById(VIEW_BTNS[v]).addEventListener('click', function(){
      view = v;
      Object.keys(VIEW_BTNS).forEach(k=>
        document.getElementById(VIEW_BTNS[k]).setAttribute('aria-pressed', k===v?'true':'false'));
      renderChart(events[current]);
    });
  });
  let rT; window.addEventListener('resize', ()=>{ clearTimeout(rT); rT=setTimeout(()=>renderChart(events[current]),150); });

  if(events.length) renderAll();
  else document.getElementById('ev-name').textContent = 'No events in data.js';
})();
</script>
</body>
</html>
